AWSTemplateFormatVersion: "2010-09-09"
Description: >
  Grants DuploCloud access to your AWS account and EKS cluster
  for pre-sales analysis. Takes 2-3 minutes to deploy.

Parameters:
  HelpdeskAccountId:
    Type: String
    Description: "Helpdesk AWS Account ID (provided by helpdesk team)"
    AllowedPattern: "[0-9]{12}"
    ConstraintDescription: "Must be a 12-digit AWS account ID"

  EKSClusterName:
    Type: String
    Description: "Name of the EKS cluster to analyze"
    AllowedPattern: "[a-zA-Z0-9][a-zA-Z0-9\\-]{0,99}"
    ConstraintDescription: "1-100 chars, letters/numbers/hyphens, must start with a letter or digit"

  EnableAWSAdmin:
    Type: String
    Default: "false"
    AllowedValues:
      - "true"
      - "false"
    Description: "Create AWS Admin role with AdministratorAccess policy"

  EnableAWSReadOnly:
    Type: String
    Default: "true"
    AllowedValues:
      - "true"
      - "false"
    Description: "Create AWS Read-Only role with ReadOnlyAccess policy"

  EnableEKSAdmin:
    Type: String
    Default: "false"
    AllowedValues:
      - "true"
      - "false"
    Description: "Create EKS Admin role with AmazonEKSClusterAdminPolicy"

  EnableEKSReadOnly:
    Type: String
    Default: "true"
    AllowedValues:
      - "true"
      - "false"
    Description: "Create EKS Read-Only role with AmazonEKSViewPolicy"

Conditions:
  CreateAWSAdminRole: !Equals [!Ref EnableAWSAdmin, "true"]
  CreateAWSReadOnlyRole: !Equals [!Ref EnableAWSReadOnly, "true"]
  CreateEKSAdminRole: !Equals [!Ref EnableEKSAdmin, "true"]
  CreateEKSReadOnlyRole: !Equals [!Ref EnableEKSReadOnly, "true"]

Resources:
  # -------------------------------------------------------
  # AWS Admin IAM Role (no EKS access)
  # -------------------------------------------------------
  AWSAdminRole:
    Type: AWS::IAM::Role
    Condition: CreateAWSAdminRole
    Properties:
      RoleName: !Sub "DuploCloud-AWS-Admin-${EKSClusterName}"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              AWS:
                - !Sub "arn:aws:iam::${HelpdeskAccountId}:root"
                - !Sub "arn:aws:iam::${AWS::AccountId}:root"
            Action: "sts:AssumeRole"
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AdministratorAccess

  # -------------------------------------------------------
  # Read-Only IAM Role (always created)
  # -------------------------------------------------------
  ReadOnlyRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "DuploCloud-ReadOnly-${EKSClusterName}"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::${DuploCloudAccountId}:root"
            Action: "sts:AssumeRole"
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/ReadOnlyAccess

  ReadOnlyEKSAccessEntry:
    Type: AWS::EKS::AccessEntry
    Properties:
      ClusterName: !Ref EKSClusterName
      PrincipalArn: !GetAtt ReadOnlyRole.Arn
      Type: STANDARD
      AccessPolicies:
        - PolicyArn: "arn:aws:eks::aws:cluster-access-policy/AmazonEKSViewPolicy"
          AccessScope:
            Type: cluster

  # -------------------------------------------------------
  # Admin IAM Role (created when AdminAccess = true)
  # -------------------------------------------------------
  AdminRole:
    Type: AWS::IAM::Role
    Condition: CreateAdminRole
    Properties:
      RoleName: !Sub "DuploCloud-Admin-${EKSClusterName}"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::${DuploCloudAccountId}:root"
            Action: "sts:AssumeRole"
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AdministratorAccess

  AdminEKSAccessEntry:
    Type: AWS::EKS::AccessEntry
    Condition: CreateAdminRole
    Properties:
      ClusterName: !Ref EKSClusterName
      PrincipalArn: !GetAtt AdminRole.Arn
      Type: STANDARD
      AccessPolicies:
        - PolicyArn: "arn:aws:eks::aws:cluster-access-policy/AmazonEKSClusterAdminPolicy"
          AccessScope:
            Type: cluster

Outputs:
  ReadOnlyRoleArn:
    Description: "Read-only Role ARN — provide to DuploCloud"
    Value: !GetAtt ReadOnlyRole.Arn

  AdminRoleArn:
    Description: "Admin Role ARN — provide to DuploCloud (only present when AdminAccess=true)"
    Condition: CreateAdminRole
    Value: !GetAtt AdminRole.Arn

  ClusterName:
    Description: "EKS Cluster Name"
    Value: !Ref EKSClusterName
